# PyComex configuration file for BACE dataset fingerprint experiments
pycomex: true

extend: predict_molecules__fp.py

name: fp_bace

description: |
  Fingerprint-based molecular property prediction on the BACE dataset.

  BACE (Beta-secretase 1) contains inhibitors of human β-secretase 1 (BACE-1)
  with measured binding affinities (IC50), treated here as a regression task
  (dataset identifier ``bace_reg``), as reported in the paper.

parameters:
  DATASET_NAME: "bace_reg"
  DATASET_NAME_ID: "bace_reg"
  DATASET_TYPE: "regression"
  TARGET_INDEX: 0
  NUM_TEST: 0.1
  FINGERPRINT_SIZE: 2048
  FINGERPRINT_RADIUS: 2
